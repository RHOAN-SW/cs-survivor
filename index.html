<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>재수강 서바이버: 폭풍을 부르는 학점 사수 대작전</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 전체 페이지 래퍼 -->
    <div id="page-wrapper">
        <h1 id="page-title">🎓 재수강 서바이버</h1>

        <!-- 게임 컨테이너 (창모드처럼 보이는 영역) -->
        <div id="game-container">
            <!-- 창 제목바 -->
            <div id="window-titlebar">
                <div class="window-dots">
                    <span class="dot dot-red"></span>
                    <span class="dot dot-yellow"></span>
                    <span class="dot dot-green"></span>
                </div>
                <span class="window-title">grade_survival.exe — 실행 중</span>
                <button id="fullscreen-btn" onclick="toggleFullscreen()" title="전체화면">⛶</button>
            </div>

            <!-- 게임 영역 -->
            <div id="game-viewport">
                <canvas id="gameCanvas"></canvas>

                <!-- 동적 조이스틱 (터치 위치에 생성됨) -->
                <div id="joystick-base">
                    <div id="joystick-stick"></div>
                </div>

                <!-- 모바일 일시정지 버튼 -->
                <button id="mobile-pause-btn" onclick="togglePause()">⏸</button>

                <div id="ui-layer">
                    <div id="top-hud">
                        <div id="exp-container">
                            <div id="exp-bar"></div>
                        </div>
                        <div id="stats-row">
                            <div>Lv.<span id="val-level">1</span></div>
                            <div>HP: <span id="val-hp">100</span></div>
                            <div><span id="val-time">00:00</span></div>
                        </div>
                    </div>
                    
                    <!-- 스킬 인벤토리 HUD (왼쪽 상단 배치) -->
                    <div id="skill-inventory"></div>

                    <div id="levelup-modal" class="modal-container hidden">
                        <div class="panel">
                            <h2>학점 사수 성공! (Level Up)</h2>
                            <p>새로운 모듈을 임포트하세요.</p>
                            <div id="skill-options">
                                <!-- 스킬 버튼 주입 -->
                            </div>
                        </div>
                    </div>

                    <div id="chest-modal" class="modal-container hidden">
                        <div class="panel">
                            <h2>🎁 선배의 족보! 🎁</h2>
                            <p id="chest-desc">슬롯을 돌려 보유 중인 아이템을 무작위로 업그레이드합니다!</p>
                            <div id="chest-slots" style="display: flex; gap: 15px; justify-content: center; margin: 25px 0;">
                                <!-- 슬롯 주입 -->
                            </div>
                            <button id="chest-claim-btn" class="submit-btn" style="width: 100%; font-size: 1.2rem; padding: 15px; display: none;" onclick="claimChest()">수령하기</button>
                        </div>
                    </div>

                    <div id="gameover-modal" class="modal-container hidden">
                        <div class="panel gameover-panel">
                            <h2>재수강 (Game Over)</h2>
                            <p>버틴 시간: <span id="final-time"></span></p>

                            <!-- 닉네임 입력 및 기록 등록 영역 -->
                            <div id="score-submit-area">
                                <div class="nickname-input-group">
                                    <input type="text" id="school-input" placeholder="학교명 (선택)" maxlength="15" autocomplete="off" />
                                    <input type="text" id="nickname-input" placeholder="닉네임 (최대 10자)" maxlength="10" autocomplete="off" />
                                    <button id="submit-score-btn" class="submit-btn" onclick="submitScore()">등록</button>
                                </div>
                                <p id="submit-status" class="submit-status"></p>
                            </div>

                            <button class="restart-btn" onclick="location.reload()">재수강하기</button>
                        </div>
                    </div>

                    <div id="pause-modal" class="modal-container hidden">
                        <div class="panel">
                            <h2>휴강 (Pause)</h2>
                            <p>디버깅 중...</p>
                            <div id="pause-report" style="margin-top: 16px; text-align: left; line-height: 1.5;"></div>
                            <button class="restart-btn" onclick="togglePause()">계속하기</button>
                            <div style="margin-top: 10px;"></div>
                            <button class="restart-btn" onclick="location.reload()" style="background-color: #f43f5e;">재수강하기</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 리더보드 (게임 컨테이너 아래) -->
        <div id="leaderboard-container">
            <div id="leaderboard-header">
                <h2>🏆 생존 랭킹</h2>
                <button id="refresh-leaderboard-btn" onclick="loadLeaderboard()">새로고침</button>
            </div>
            <div id="leaderboard-body">
                <table id="leaderboard-table">
                    <thead>
                        <tr>
                            <th>순위</th>
                            <th>학교</th>
                            <th>닉네임</th>
                            <th>시간</th>
                            <th>Lv</th>
                            <th>날짜</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-tbody">
                        <!-- JS에서 동적으로 채움 -->
                    </tbody>
                </table>
                <p id="leaderboard-empty" class="hidden">아직 등록된 기록이 없습니다.</p>
            </div>
        </div>
    </div>

    <!-- DB 연동 파일 -->
    <script src="firebase-db.js"></script>
    <!-- 게임 메인 파일 -->
    <script src="game.js"></script>
</body>

</html>
